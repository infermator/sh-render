name: Daily Headline Slideshow

# Free-tier runner (public repo = unlimited minutes). Generator cloned from the
# private Shotlee repo at runtime via GH_PAT — code stays private.

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: 'Cards per slideshow (default 3)'
        required: false
        default: '3'
      slideshows:
        description: 'How many slideshows to generate this run (buffer build)'
        required: false
        default: '1'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Clone private generator
        run: |
          git clone --depth 1 \
            "https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository_owner }}/Shotlee.git" work

      - name: Cache Remotion Chrome
        uses: actions/cache@v4
        with:
          path: ~/.cache/remotion
          key: remotion-chrome-${{ runner.os }}-v1

      - name: Install system ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: npm ci
        working-directory: work/generator
        run: npm ci --no-audit --no-fund

      - name: Verify MAM auth (fail fast)
        env:
          BUFFER_PUSH_SECRET: ${{ secrets.BUFFER_PUSH_SECRET }}
        run: |
          CODE=$(curl -sS -o /dev/null -w '%{http_code}' \
            -X POST "https://21media-mam.vercel.app/api/shotlee/photo/enqueue" \
            -H "Authorization: Bearer $BUFFER_PUSH_SECRET" \
            -H 'Content-Type: application/json' -d '{}')
          echo "photo enqueue auth probe → HTTP $CODE"
          [ "$CODE" = "401" ] && { echo "::error::BUFFER_PUSH_SECRET wrong"; exit 1; } || true

      - name: Generate slideshow(s) with retry
        working-directory: work/generator
        env:
          COUNT: ${{ inputs.count || '3' }}
          BUFFER_PUSH_SECRET: ${{ secrets.BUFFER_PUSH_SECRET }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          MAM_BASE: 'https://21media-mam.vercel.app'
        run: |
          N="${{ inputs.slideshows || '1' }}"
          for i in $(seq 1 "$N"); do
            echo "════ slideshow $i/$N ════"
            ok=0
            for attempt in 1 2 3; do
              if node scripts/generate-headline-slideshow.mjs; then ok=1; break; fi
              echo "attempt $attempt failed; backing off…"; sleep $((attempt * 10))
            done
            [ "$ok" = "1" ] || echo "::warning::slideshow $i failed after 3 attempts (soft-fail; next run retries)"
          done
